# TacMove entity definition: MiniCS enemy - the ranged bot the round loop
# fights. Unlike duel_bot (melee), this one advances, strafes, aims, and
# shoots. Its whole brain lives in client code (Game::updateMinicsEnemies);
# this file is just the silhouette + hitbox. Crimson so it reads as ENEMY at
# a glance. max_health is tuned to ~3 Glock body shots. Not spawnable: the
# round loop places it, not the build menu.
id              = minics_bot
name            = Enemy
category        = bot
size            = 0.64 1.82 0.64
color           = 0.78 0.22 0.20
solid           = 1
spawnable       = 0
max_health      = 90
respawn_seconds = 0
