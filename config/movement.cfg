# ============================================================
#  TacMove - movement tuning (Milestone 1)
#  All distances are meters, all times are seconds.
#  Press F5 in game to hot-reload this file.
#  (tick_rate is read once at startup and needs a restart.)
# ============================================================

# ---- Simulation / camera ----
tick_rate               = 128     # fixed physics ticks per second
mouse_sensitivity       = 1.8     # multiplier on 0.022 deg per mouse count
fov_degrees             = 74      # vertical field of view (74 vert ~ 106 horiz @16:9)

# ---- Target speeds (max ground speed per movement mode) ----
run_speed               = 6.0     # default movement, no sprint by design
walk_speed              = 2.6     # held walk key: slow, precise
crouch_speed            = 1.8     # crouched movement

# ---- Ground movement ----
ground_accel            = 12.0    # how hard you accelerate toward wish direction.
                                  # Also what makes counter-strafing work: tapping the
                                  # opposite key decelerates at ~accel*run_speed m/s^2,
                                  # much faster than friction alone.
friction                = 7.0     # exponential-ish slowdown when grounded
stop_speed              = 1.2     # below this speed friction acts as if you moved this fast,
                                  # so you snap to a stop instead of sliding forever

# ---- Air movement ----
air_accel               = 14.0    # acceleration while airborne
air_speed_cap           = 0.95    # air control cap: wish speed is clamped to this in air,
                                  # giving limited (strafe-style) air control
gravity                 = 20.0    # stronger than real life, like most shooters
jump_speed              = 5.1     # vertical takeoff speed (~0.65 m apex with gravity 20)
auto_bhop               = 0       # 1 = holding jump re-jumps on landing, 0 = must re-press
jump_buffer_ms          = 80      # a jump press this many ms before landing still counts

# ---- Player body ----
player_radius           = 0.4     # half-width of the collision box
stand_height            = 1.8
crouch_height           = 1.3
eye_offset              = 0.15    # eyes sit this far below the top of the head
crouch_transition_speed = 10.0    # how quickly the camera eases between stand/crouch
