name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          - name: linux-x64
            os: ubuntu-latest
          - name: macos-arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (SDL3 build requirements)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxkbcommon-dev libwayland-dev \
            wayland-protocols libegl1-mesa-dev libgl1-mesa-dev libdrm-dev \
            libgbm-dev libasound2-dev libpulse-dev libudev-dev libdbus-1-dev \
            libibus-1.0-dev

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/vcpkg/archives
            ~/.cache/vcpkg/archives
            ~/Library/Caches/vcpkg/archives
          key: vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.name }}-

      - name: Set up vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg %USERPROFILE%\vcpkg
          call %USERPROFILE%\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Set up vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/config
          cp config/movement.cfg dist/config/
          if [ -f build/Release/tacmove.exe ]; then
            cp build/Release/tacmove.exe dist/
            cp build/Release/*.dll dist/ 2>/dev/null || true
          else
            cp build/tacmove dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tacmove-${{ matrix.name }}
          path: dist/
